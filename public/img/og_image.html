<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bolas; — OG image</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #2a2d33;
    font-family: var(--font-sans);
    width: 100%; height: 100%;
  }
  .stage {
    width: 100vw;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  /* ---------- Scaling shell ----------
     The frame is fixed 1200×630. We wrap it in a shell that owns the
     responsive size, and scale the frame down with CSS calc + transform. */
  .shell {
    width: min(calc(100vw - 40px), calc((100vh - 40px) * (1200 / 630)));
    aspect-ratio: 1200 / 630;
    position: relative;
  }
  .shell .frame {
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    /* scale 1200×630 down to fill shell */
    transform: scale(calc((min(100vw - 40px, calc((100vh - 40px) * (1200 / 630)))) / 1200));
  }

  /* ---------- 1200×630 frame ---------- */
  .frame {
    width: 1200px; height: 630px;
    position: relative; overflow: hidden;
    background: #fbfaf7;          /* paper */
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    transform-origin: center;
  }

  /* Top + bottom hairlines, inset like a printed bookplate.
     These define the composition without any color decoration. */
  .rule {
    position: absolute; left: 80px; right: 80px;
    height: 1px; background: var(--border);
  }
  .rule.top    { top: 80px; }
  .rule.bottom { bottom: 80px; }

  /* ---------- Top stamp row ---------- */
  .stampRow {
    position: absolute; left: 80px; right: 80px; top: 80px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--fg-3);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .stampRow .left  { display: flex; align-items: center; gap: 14px; }
  .stampRow .right { color: var(--fg-3); }
  .stampRow .dot {
    display: inline-block;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--denim);
  }

  /* ---------- Hero: the bolas; wordmark ---------- */
  .hero {
    position: absolute; left: 0; right: 0;
    top: 50%;
    transform: translateY(-54%);
    display: flex; flex-direction: column; align-items: center;
    gap: 28px;
  }

  .mark {
    width: 132px; height: 132px;
    border-radius: 50%;
    background: #171615;
    color: #fbfaf7;
    display: flex; align-items: center; justify-content: center;
    font-size: 96px;
    font-weight: 600;
    letter-spacing: -5px;
    line-height: 1;
  }
  .mark i {
    color: var(--brand);          /* ember ; — brand moment 1 */
    font-style: normal;
    font-weight: 500;
    margin-left: -3px;
    /* nudge baseline so the ; sits true with the b */
    transform: translateY(2px);
    display: inline-block;
  }

  .wordmark {
    font-family: var(--font-sans);
    font-size: 168px;
    font-weight: 700;
    letter-spacing: -6px;
    line-height: 1;
    color: var(--fg-1);
    margin: 0;
  }
  .wordmark i {
    color: var(--brand);          /* ember ; — same brand moment, scaled up */
    font-style: normal;
    font-weight: 500;
    letter-spacing: 0;
    margin-left: -2px;
  }

  /* ---------- Tagline (one line, mono, mid-grey) ---------- */
  .tagline {
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 400;
    color: var(--fg-2);
    letter-spacing: 0.02em;
    line-height: 1;
    margin-top: 6px;
  }
  .tagline em {
    color: var(--brand);          /* the second ember mark — the period */
    font-style: normal;
    font-weight: 500;
  }
  .tagline .sep {
    display: inline-block;
    width: 1px; height: 14px;
    background: var(--border);
    margin: 0 14px;
    vertical-align: -2px;
  }

  /* ---------- Bottom stamp row ---------- */
  .footRow {
    position: absolute; left: 80px; right: 80px; bottom: 80px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--fg-3);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .footRow .url {
    color: var(--fg-1);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: none;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="shell">
  <div class="frame" data-screen-label="OG image">

    <div class="rule top"></div>
    <div class="rule bottom"></div>

    <div class="stampRow">
      <div class="left">
        <span>Bolas Lien</span>
      </div>
      <div class="right"></div>
    </div>

    <div class="hero">
      <h1 class="wordmark">bolas<i>;</i></h1>
      <div class="tagline">
        AI &nbsp;·&nbsp; Architecture &nbsp;·&nbsp; Craft<em>.</em>
      </div>
    </div>

    <div class="footRow">
      <div class="left"></div>
      <div class="right">
        <span class="url">bolaslien.github.io/blog</span>
      </div>
    </div>

  </div>
  </div>
</div>

<script>
  // No-op: scaling handled by CSS.
</script>
</body>
</html>
